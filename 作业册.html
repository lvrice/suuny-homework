<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的 20 天小作业 · 幼儿园中班</title>
  <style>
/* ===== 全局基础 ===== */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  font-family: "Comic Sans MS", "Noto Sans SC", "PingFang SC",
    "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
  background: linear-gradient(135deg, #fff1f8 0%, #fffbe6 50%, #e8f8ff 100%);
  color: #333;
  min-height: 100vh;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

.app {
  max-width: 1200px;
  margin: 0 auto;
  padding: 14px;
}

/* ===== 顶部标题栏 ===== */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #fff;
  padding: 12px 20px;
  border-radius: 18px;
  box-shadow: 0 6px 20px rgba(255, 150, 180, 0.15);
  margin-bottom: 14px;
  border: 3px solid #ffd3e2;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-emoji {
  font-size: 28px;
}

.brand-title {
  font-size: 22px;
  font-weight: bold;
  color: #ff6b9a;
  letter-spacing: 2px;
}

.page-indicator {
  font-size: 18px;
  color: #ff922b;
  background: #fff3bf;
  padding: 5px 14px;
  border-radius: 999px;
  font-weight: bold;
}

/* ===== A4 横向对开页（两天并排） ===== */
.spread {
  display: none;
  width: 297mm;
  height: 210mm;
  margin: 0 auto 16px;
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
  overflow: hidden;
  position: relative;
}

.spread.active {
  display: flex;
}

.spread::before {
  content: "";
  position: absolute;
  left: 50%;
  top: 4mm;
  bottom: 4mm;
  width: 0;
  border-left: 2px dashed #ffd3e2;
  transform: translateX(-50%);
  pointer-events: none;
}

/* 单页（每一天占半张 A4 横向） */
.page {
  width: 50%;
  height: 100%;
  padding: 5mm 6mm;
  display: flex;
  flex-direction: column;
  gap: 3mm;
  overflow: hidden;
}

.page-header {
  text-align: center;
  font-size: 15px;
  font-weight: bold;
  color: #fff;
  background: linear-gradient(90deg, #ff6b9a, #ffa94d, #fcc419, #51cf66, #4dabf7, #b197fc);
  padding: 3px 0;
  border-radius: 8px;
  letter-spacing: 2px;
  text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.08);
  flex-shrink: 0;
}

.page-header .sub {
  display: block;
  font-size: 10px;
  margin-top: 1px;
  letter-spacing: 1px;
  font-weight: normal;
}

/* ===== 模块通用卡片 ===== */
.module {
  border-radius: 10px;
  padding: 5px 8px 6px;
  border: 2px dashed;
  flex-shrink: 0;
}

.module-title {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  font-weight: bold;
  margin-bottom: 4px;
}

.module-title .emoji {
  font-size: 15px;
}

.module-title .module-theme {
  font-size: 10px;
  font-weight: normal;
  color: #868e96;
  margin-left: 2px;
}

/* 模块配色 */
.module-numbers { background: #fff5f7; border-color: #ffb3c6; }
.module-numbers .module-title { color: #e64980; }

.module-math { background: #fff9db; border-color: #ffd43b; }
.module-math .module-title { color: #f59f00; }

.module-letters { background: #e6fcf5; border-color: #63e6be; }
.module-letters .module-title { color: #12b886; }

.module-chars { background: #e7f5ff; border-color: #74c0fc; }
.module-chars .module-title { color: #1c7ed6; }

/* ===== 模块一：数字 ===== */
.numbers-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 8px;
}

.num-group {
  background: #fff;
  border-radius: 8px;
  padding: 3px 6px;
  border: 2px solid #ffe0ec;
}

.num-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 2px 0;
}

.num-row.practice {
  border-top: 1px dashed #ffd3e2;
  margin-top: 1px;
  padding-top: 3px;
  position: relative;
}

.num-row.practice::before {
  content: "✏️";
  position: absolute;
  top: -7px;
  left: 2px;
  background: #fff;
  font-size: 9px;
  padding: 0 2px;
}

.num-cell {
  width: 28px;
  height: 28px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: bold;
  color: #e64980;
  font-family: "Century Gothic", "Trebuchet MS", "Arial", sans-serif;
}

.num-cell.blank {
  border: 1.5px dashed #ff8fab;
  border-radius: 5px;
  color: transparent;
  background: #fff9fb;
}

/* ===== 模块二：加法 ===== */
.math-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px 8px;
}

.math-item {
  display: flex;
  align-items: center;
  gap: 4px;
  background: #fff;
  border-radius: 7px;
  padding: 4px 6px;
  border: 1.5px solid #ffe8a8;
  font-size: 16px;
  font-weight: bold;
  color: #f59f00;
}

.math-item .idx {
  font-size: 11px;
  color: #adb5bd;
  min-width: 16px;
}

.math-blank {
  display: inline-block;
  min-width: 30px;
  height: 24px;
  border: 1.5px dashed #f59f00;
  border-radius: 5px;
  background: #fffbea;
  margin-left: 2px;
}

/* ===== 模块三：英文字母（四线三格） ===== */
.letters-list {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.letter-row {
  background: #fff;
  border-radius: 7px;
  padding: 3px 6px;
  border: 1.5px solid #b2f2bb;
  display: flex;
  align-items: center;
  gap: 6px;
}

.letter-label {
  font-size: 12px;
  color: #12b886;
  font-weight: bold;
  flex-shrink: 0;
  min-width: 32px;
  text-align: center;
}

.four-line-row {
  display: flex;
  gap: 4px;
  flex-wrap: nowrap;
}

.four-line {
  width: 28px;
  height: 26px;
  background:
    repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent calc(33.33% - 1px),
      #ffd6a5 calc(33.33% - 1px),
      #ffd6a5 33.33%
    );
  border: 1.5px solid #ffd43b;
  border-radius: 4px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: "Sassoon Primary", "Sassoon", "Century Gothic", "Trebuchet MS", "Arial", sans-serif;
  font-size: 20px;
  font-weight: bold;
  line-height: 1;
}

.four-line.demo { color: #12b886; }
.four-line.blank { color: #cdd7e1; }

/* ===== 模块四：汉字（米字格） ===== */
.chars-list {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.char-row {
  background: #fff;
  border-radius: 7px;
  padding: 3px 6px;
  border: 1.5px solid #a5d8ff;
  display: flex;
  align-items: center;
  gap: 6px;
}

.char-label {
  font-size: 14px;
  color: #1c7ed6;
  font-weight: bold;
  flex-shrink: 0;
  min-width: 22px;
  text-align: center;
  font-family: "KaiTi", "STKaiti", "楷体", sans-serif;
}

.mi-cells {
  display: flex;
  gap: 4px;
  flex-wrap: nowrap;
}

.mi-cell {
  width: 30px;
  height: 30px;
  border: 1.5px solid #f08c00;
  background-color: #fffdf5;
  background-image:
    linear-gradient(#ff8787, #ff8787),
    linear-gradient(#ff8787, #ff8787);
  background-size: 100% 1px, 1px 100%;
  background-position: 0 50%, 50% 0;
  background-repeat: no-repeat;
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: bold;
  line-height: 1;
  font-family: "KaiTi", "STKaiti", "楷体", "Microsoft YaHei", sans-serif;
}

.mi-cell::before,
.mi-cell::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 50%;
  width: 141%;
  height: 1px;
  background: #ff8787;
  opacity: 0.55;
  transform-origin: 0 0;
}

.mi-cell::before { transform: translate(-50%, -50%) rotate(45deg); }
.mi-cell::after  { transform: translate(-50%, -50%) rotate(-45deg); }

.mi-cell.demo { color: #1c7ed6; }
.mi-cell.blank { color: transparent; }

/* ===== 页脚 ===== */
.page-footer {
  margin-top: auto;
  text-align: center;
  font-size: 10px;
  color: #868e96;
  letter-spacing: 1px;
  padding-top: 3px;
  flex-shrink: 0;
}

/* ===== 底部导航 ===== */
.bottom-nav {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin: 18px 0 6px;
}

.nav-btn {
  font-family: inherit;
  font-size: 18px;
  font-weight: bold;
  padding: 12px 24px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  color: #fff;
  letter-spacing: 1px;
}

.nav-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
}

.nav-btn:active {
  transform: translateY(0);
}

.nav-btn.prev { background: linear-gradient(135deg, #ffa8c5, #ff6b9a); }
.nav-btn.next { background: linear-gradient(135deg, #74c0fc, #4dabf7); }
.nav-btn.print { background: linear-gradient(135deg, #ffd43b, #ff922b); color: #fff; }

.nav-btn:disabled {
  background: #dee2e6 !important;
  color: #adb5bd;
  cursor: not-allowed;
  box-shadow: none;
  transform: none;
}

/* ===== 快速跳转 ===== */
.day-jump {
  text-align: center;
  margin-top: 6px;
  font-size: 15px;
  color: #868e96;
}

.day-jump select {
  font-family: inherit;
  font-size: 15px;
  padding: 5px 10px;
  border-radius: 8px;
  border: 2px solid #dee2e6;
  background: #fff;
  cursor: pointer;
}

/* ===== 顶部栏右侧 ===== */
.top-bar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.settings-btn {
  font-size: 22px;
  background: none;
  border: 2px solid #dee2e6;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.settings-btn:hover {
  background: #fff3bf;
  border-color: #ffd43b;
  transform: rotate(45deg);
}

/* ===== 配置面板 ===== */
.config-panel {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
}

.config-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.35);
  backdrop-filter: blur(4px);
}

.config-card {
  position: relative;
  z-index: 1;
  width: 540px;
  max-width: 95vw;
  max-height: 90vh;
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  animation: configSlideIn 0.3s ease;
}

@keyframes configSlideIn {
  from { transform: translateY(30px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.config-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 22px;
  background: linear-gradient(90deg, #ff6b9a, #ffa94d, #fcc419, #51cf66, #4dabf7);
  color: #fff;
  font-size: 20px;
  font-weight: bold;
  letter-spacing: 1px;
}

.config-close {
  background: rgba(255,255,255,0.3);
  border: none;
  color: #fff;
  font-size: 22px;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}

.config-close:hover {
  background: rgba(255,255,255,0.5);
}

.config-body {
  padding: 18px 22px;
  overflow-y: auto;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.config-group {
  border: 2px solid;
  border-radius: 14px;
  padding: 12px 16px 10px;
  margin: 0;
}

.config-group legend {
  font-size: 15px;
  font-weight: bold;
  padding: 0 8px;
}

.cg-numbers { border-color: #ffb3c6; background: #fff8fa; }
.cg-numbers legend { color: #e64980; }

.cg-math { border-color: #ffd43b; background: #fffdf0; }
.cg-math legend { color: #f59f00; }

.cg-letters { border-color: #63e6be; background: #f0fdf8; }
.cg-letters legend { color: #12b886; }

.cg-chars { border-color: #74c0fc; background: #f0f8ff; }
.cg-chars legend { color: #1c7ed6; }

.config-row {
  margin-top: 8px;
}

.config-row > label {
  display: block;
  font-size: 13px;
  color: #495057;
  margin-bottom: 4px;
  font-weight: 600;
}

.config-input-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.cfg-num {
  width: 80px;
  padding: 6px 10px;
  font-size: 15px;
  border: 2px solid #dee2e6;
  border-radius: 8px;
  text-align: center;
  font-family: inherit;
}

.cfg-num:focus {
  border-color: #4dabf7;
  outline: none;
  box-shadow: 0 0 0 3px rgba(77, 171, 247, 0.15);
}

.cfg-select {
  padding: 6px 12px;
  font-size: 14px;
  border: 2px solid #dee2e6;
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
  font-family: inherit;
}

.cfg-select:focus {
  border-color: #4dabf7;
  outline: none;
}

.cfg-select.cfg-letter {
  width: 70px;
  text-align: center;
  font-size: 16px;
  font-weight: bold;
}

.cfg-check {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 14px;
  cursor: pointer;
  padding: 4px 10px;
  border: 1.5px solid #dee2e6;
  border-radius: 8px;
  transition: all 0.15s;
}

.cfg-check:has(input:checked) {
  background: #fff3bf;
  border-color: #ffd43b;
}

.cfg-check input { cursor: pointer; }

.cfg-textarea {
  width: 100%;
  padding: 8px 12px;
  font-size: 15px;
  border: 2px solid #dee2e6;
  border-radius: 10px;
  font-family: "KaiTi", "STKaiti", "楷体", "Microsoft YaHei", sans-serif;
  resize: vertical;
  line-height: 1.6;
}

.cfg-textarea:focus {
  border-color: #4dabf7;
  outline: none;
  box-shadow: 0 0 0 3px rgba(77, 171, 247, 0.15);
}

.config-hint {
  font-size: 12px;
  color: #868e96;
  margin-top: 4px;
}

.config-footer {
  display: flex;
  justify-content: flex-end;
  gap: 12px;
  padding: 14px 22px;
  border-top: 1px solid #f1f3f5;
  background: #f8f9fa;
}

.cfg-btn {
  padding: 10px 22px;
  font-size: 15px;
  font-weight: bold;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}

.cfg-btn-reset {
  background: #fff;
  color: #868e96;
  border: 2px solid #dee2e6;
}

.cfg-btn-reset:hover {
  background: #f8f9fa;
  border-color: #adb5bd;
}

.cfg-btn-apply {
  background: linear-gradient(135deg, #51cf66, #40c057);
  color: #fff;
  box-shadow: 0 4px 12px rgba(64, 192, 87, 0.3);
}

.cfg-btn-apply:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 18px rgba(64, 192, 87, 0.4);
}

/* ===== 打印贴士 ===== */
.print-tips {
  max-width: 900px;
  margin: 16px auto 0;
  padding: 12px 18px;
  background: #fff3bf;
  border: 2px dashed #ffd43b;
  border-radius: 12px;
  font-size: 14px;
  color: #5c3d00;
  line-height: 1.9;
  text-align: center;
}

.print-tips strong {
  color: #e67700;
  margin-right: 6px;
}

.print-tips .tip-item {
  display: inline-block;
  background: #fff;
  padding: 2px 10px;
  border-radius: 999px;
  margin: 2px 4px;
  border: 1px solid #ffe8a8;
}

.print-tips .tip-item b {
  color: #d9480f;
}

/* ===== 打印样式（精准锁定一张横向 A4） ===== */
@media print {
  @page {
    size: 297mm 210mm;
    margin: 0;
  }

  * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  html, body {
    margin: 0 !important;
    padding: 0 !important;
    width: 297mm !important;
    height: 210mm !important;
    background: #fff !important;
    overflow: hidden;
  }

  .app {
    margin: 0 !important;
    padding: 0 !important;
    max-width: none !important;
    width: 297mm;
  }

  .pages {
    margin: 0 !important;
    padding: 0 !important;
  }

  .no-print {
    display: none !important;
  }

  .spread {
    display: none !important;
    margin: 0 !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    border: none !important;
    page-break-after: always;
    break-after: page;
    page-break-inside: avoid;
    break-inside: avoid;
  }

  .spread.active {
    display: flex !important;
    width: 297mm !important;
    height: 210mm !important;
    max-width: 297mm !important;
    max-height: 210mm !important;
    overflow: hidden !important;
  }

  .page {
    height: 210mm !important;
    max-height: 210mm !important;
    overflow: hidden !important;
  }
}

/* ===== 窄屏适配：缩放 spread（仅屏幕，不影响打印） ===== */
@media screen and (max-width: 1220px) {
  .spread {
    transform-origin: top left;
    transform: scale(0.9);
    margin-bottom: 8mm;
  }
}

@media screen and (max-width: 1100px) {
  .spread {
    transform: scale(0.8);
  }
}

@media screen and (max-width: 980px) {
  .spread {
    transform: scale(0.7);
  }
}

@media screen and (max-width: 860px) {
  .spread {
    transform: scale(0.6);
  }
}

/* ===== 移动端适配（< 768px）===== */
@media screen and (max-width: 767px) {
  .app {
    padding: 10px;
  }

  /* 顶部栏 */
  .top-bar {
    padding: 10px 14px;
    border-radius: 14px;
    margin-bottom: 10px;
  }

  .brand-emoji { font-size: 22px; }

  .brand-title {
    font-size: 17px;
    letter-spacing: 1px;
  }

  .page-indicator {
    font-size: 14px;
    padding: 4px 10px;
  }

  .settings-btn {
    width: 34px;
    height: 34px;
    font-size: 18px;
  }

  .top-bar-right { gap: 8px; }

  /* 隐藏打印贴士 */
  .print-tips { display: none !important; }

  /* spread 容器：取消固定 A4 尺寸，改为自然流式 */
  .spread {
    width: 100% !important;
    height: auto !important;
    transform: none !important;
    margin-bottom: 0 !important;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    flex-direction: column;
  }

  .spread::before { display: none; }

  /* 单页改为全宽竖向 */
  .page {
    width: 100%;
    height: auto;
    padding: 14px 12px;
    gap: 10px;
    overflow: visible;
  }

  /* 手机上每次只看一天，第二天默认隐藏 */
  .spread .page:nth-child(2) {
    display: none;
  }

  .spread.show-second .page:nth-child(1) {
    display: none;
  }

  .spread.show-second .page:nth-child(2) {
    display: flex;
  }

  /* 页头 */
  .page-header {
    font-size: 18px;
    padding: 10px 0;
    border-radius: 12px;
  }

  .page-header .sub {
    font-size: 12px;
    margin-top: 3px;
  }

  /* 模块卡片 */
  .module {
    padding: 10px 12px;
    border-radius: 12px;
  }

  .module-title {
    font-size: 15px;
    margin-bottom: 8px;
  }

  .module-title .emoji { font-size: 17px; }

  .module-title .module-theme {
    font-size: 11px;
  }

  <script>
/* ============================================================
 * 幼儿园中班 20 天小作业 —— 数据与渲染（可配置版）
 * ============================================================ */

const TOTAL_DAYS = 20;

/* ========== 默认配置 ========== */
const DEFAULT_CONFIG = {
  numMin: 1,
  numMax: 100,
  mathMax: 10,
  mathAdd: true,
  mathSub: false,
  letterStart: 0,   // A=0
  letterEnd: 25,     // Z=25
  customChars: "",
};

let CFG = { ...DEFAULT_CONFIG };

/* ---------- 默认汉字库（60 个） ---------- */
const DEFAULT_CHARS = [
  "一","二","三","四","五","六","七","八","九","十",
  "大","小","上","下","中","人","口","手","日","月",
  "星","水","火","山","田","土","木","爸","妈","我",
  "爷","奶","家","多","少","来","左","右","前","天",
  "地","雨","爱","心","好","红","黄","蓝","花","草",
  "树","牛","羊","马","鸡","鸭","鱼","春","夏","秋",
];

/* ============================================================
 * 模块一：数字书写
 * ============================================================ */
function getNumbersForDay(day) {
  const min = CFG.numMin;
  const max = CFG.numMax;
  const total = max - min + 1;
  const perDay = 10;
  const offset = ((day - 1) * perDay) % total;
  const list = [];
  for (let i = 0; i < perDay; i++) {
    list.push(min + (offset + i) % total);
  }
  return list.map((n) => ({ value: n }));
}

/* ============================================================
 * 模块二：计算练习（动态生成，支持加减法 + 不同范围）
 * ============================================================ */
function generateMathProblems(day) {
  const maxVal = CFG.mathMax;
  const canAdd = CFG.mathAdd;
  const canSub = CFG.mathSub;
  if (!canAdd && !canSub) return [];

  const seed = day * 137 + 42;
  const rng = mulberry32(seed);
  const problems = [];

  const progressFrac = (day - 1) / (TOTAL_DAYS - 1);
  const currentCeil = Math.max(3, Math.round(maxVal * (0.3 + 0.7 * progressFrac)));

  for (let i = 0; i < 10; i++) {
    const doSub = canSub && (!canAdd || rng() > 0.5);
    if (doSub) {
      const sum = Math.floor(rng() * currentCeil) + 1;
      const b = Math.floor(rng() * sum) + 0;
      const a = sum;
      problems.push({ a, op: "−", b, answer: a - b });
    } else {
      const sum = Math.floor(rng() * currentCeil) + 1;
      const a = Math.floor(rng() * sum);
      const b = sum - a;
      problems.push({ a, op: "+", b, answer: a + b });
    }
  }
  return problems;
}

function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6d2b79f5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function getMathThemeForDay(day) {
  const maxVal = CFG.mathMax;
  const progressFrac = (day - 1) / (TOTAL_DAYS - 1);
  const currentCeil = Math.max(3, Math.round(maxVal * (0.3 + 0.7 * progressFrac)));
  const ops = [];
  if (CFG.mathAdd) ops.push("加法");
  if (CFG.mathSub) ops.push("减法");
  const opStr = ops.join("和") || "加法";

  if (day <= 2) return `${opStr} · ${currentCeil} 以内入门`;
  if (day <= 5) return `${opStr} · ${currentCeil} 以内基础`;
  if (day <= 10) return `${opStr} · ${currentCeil} 以内提高`;
  if (day <= 15) return `${opStr} · ${currentCeil} 以内巩固`;
  if (day <= 18) return `${opStr} · ${currentCeil} 以内灵活`;
  return `${opStr} · ${currentCeil} 以内综合挑战`;
}

/* ============================================================
 * 模块三：英文字母
 * ============================================================ */
function getLettersForDay(day) {
  const start = CFG.letterStart;
  const end = CFG.letterEnd;
  const range = end - start + 1;
  const letters = [];
  for (let i = 0; i < 3; i++) {
    const idx = start + ((day - 1) * 3 + i) % range;
    const upper = String.fromCharCode(65 + idx);
    const lower = String.fromCharCode(97 + idx);
    letters.push({ upper, lower });
  }
  return letters;
}

/* ============================================================
 * 模块四：汉字书写
 * ============================================================ */
function getActiveChars() {
  if (CFG.customChars && CFG.customChars.trim()) {
    return CFG.customChars.trim().split(/[\s,，、]+/).filter(Boolean);
  }
  return DEFAULT_CHARS;
}

function getCharsForDay(day) {
  const pool = getActiveChars();
  const perDay = 3;
  const out = [];
  for (let i = 0; i < perDay; i++) {
    const idx = ((day - 1) * perDay + i) % pool.length;
    out.push(pool[idx]);
  }
  return out;
}

/* ============================================================
 * 渲染
 * ============================================================ */
function renderPage(day) {
  const page = document.createElement("section");
  page.className = "page";
  page.dataset.day = String(day);

  page.innerHTML = `
    <div class="page-header">
      第 ${day} 天 · 小小练习本
      <span class="sub">加油！棒棒哒 🌟</span>
    </div>

    <div class="module module-numbers">
      <div class="module-title"><span class="emoji">🔢</span> 模块一：认识数字（照着写一写）</div>
      ${renderNumbers(day)}
    </div>

    <div class="module module-math">
      <div class="module-title">
        <span class="emoji">➕</span>
        <span>模块二：计算小能手</span>
        <span class="module-theme">· ${getMathThemeForDay(day)}</span>
      </div>
      ${renderMath(day)}
    </div>

    <div class="module module-letters">
      <div class="module-title"><span class="emoji">🔤</span> 模块三：英文字母（描一描 写一写）</div>
      ${renderLetters(day)}
    </div>

    <div class="module module-chars">
      <div class="module-title"><span class="emoji">📝</span> 模块四：写汉字（描红 练写）</div>
      ${renderChars(day)}
    </div>

    <div class="page-footer">第 ${day}/${TOTAL_DAYS} 天 · 家长签字 ✍️ ________</div>
  `;
  return page;
}

function renderNumbers(day) {
  const nums = getNumbersForDay(day);
  const col1 = nums.slice(0, 5);
  const col2 = nums.slice(5, 10);

  const buildRow = (list) => list
    .map((n) => `<div class="num-cell">${n.value}</div>`)
    .join("");

  const practiceRow = Array(5)
    .fill('<div class="num-cell blank"></div>')
    .join("");

  return `
    <div class="numbers-grid">
      <div class="num-group">
        <div class="num-row">${buildRow(col1)}</div>
        <div class="num-row practice">${practiceRow}</div>
      </div>
      <div class="num-group">
        <div class="num-row">${buildRow(col2)}</div>
        <div class="num-row practice">${practiceRow}</div>
      </div>
    </div>
  `;
}

function renderMath(day) {
  const problems = generateMathProblems(day);
  const items = problems.map((p, i) => `
    <div class="math-item">
      <span class="idx">${i + 1}.</span>
      <span>${p.a} ${p.op} ${p.b} =</span>
      <span class="math-blank"></span>
    </div>
  `).join("");
  return `<div class="math-grid">${items}</div>`;
}

function renderLetters(day) {
  const letters = getLettersForDay(day);
  const blanks = Array(3).fill('<div class="four-line blank"></div>').join("");
  return `
    <div class="letters-list">
      ${letters.map(({ upper, lower }) => `
        <div class="letter-row">
          <div class="letter-label">${upper} ${lower}</div>
          <div class="four-line-row">
            <div class="four-line demo">${upper}</div>
            <div class="four-line demo">${lower}</div>
            ${blanks}
          </div>
        </div>
      `).join("")}
    </div>
  `;
}

function renderChars(day) {
  const chars = getCharsForDay(day);
  const blanks = Array(3).fill('<div class="mi-cell blank"></div>').join("");
  return `
    <div class="chars-list">
      ${chars.map((ch) => `
        <div class="char-row">
          <div class="char-label">${ch}</div>
          <div class="mi-cells">
            <div class="mi-cell demo">${ch}</div>
            ${blanks}
          </div>
        </div>
      `).join("")}
    </div>
  `;
}

/* ============================================================
 * 导航逻辑（桌面端按 spread 对开页，移动端按单天）
 * ============================================================ */
const DAYS_PER_SPREAD = 2;
const TOTAL_SPREADS = Math.ceil(TOTAL_DAYS / DAYS_PER_SPREAD);

let currentSpread = 1;
let currentMobileDay = 1;

function isMobile() {
  return window.innerWidth < 768;
}

function spreadDays(s) {
  const d1 = (s - 1) * DAYS_PER_SPREAD + 1;
  const d2 = Math.min(d1 + 1, TOTAL_DAYS);
  return [d1, d2];
}

function showSpread(s) {
  s = Math.max(1, Math.min(TOTAL_SPREADS, s));
  currentSpread = s;
  const [d1, d2] = spreadDays(s);

  document.querySelectorAll(".spread").forEach((el) => {
    el.classList.remove("active");
    el.classList.remove("show-second");
  });
  const target = document.querySelector(`.spread[data-spread="${s}"]`);
  if (target) target.classList.add("active");

  if (isMobile()) {
    const isSecond = currentMobileDay === d2 && d1 !== d2;
    if (isSecond && target) target.classList.add("show-second");
    document.getElementById("currentDay").textContent = `${currentMobileDay}`;
    document.getElementById("prevBtn").disabled = currentMobileDay === 1;
    document.getElementById("nextBtn").disabled = currentMobileDay === TOTAL_DAYS;
  } else {
    document.getElementById("currentDay").textContent = d1 === d2 ? `${d1}` : `${d1}-${d2}`;
    document.getElementById("prevBtn").disabled = s === 1;
    document.getElementById("nextBtn").disabled = s === TOTAL_SPREADS;
  }

  document.getElementById("daySelect").value = isMobile() ? String(currentMobileDay) : String(s);

  const hashVal = isMobile() ? `day=${currentMobileDay}` : `spread=${s}`;
  if (location.hash !== `#${hashVal}`) {
    history.replaceState(null, "", `#${hashVal}`);
  }

  window.scrollTo({ top: 0, behavior: "smooth" });
}

function navigate(delta) {
  if (isMobile()) {
    currentMobileDay = Math.max(1, Math.min(TOTAL_DAYS, currentMobileDay + delta));
    currentSpread = Math.ceil(currentMobileDay / DAYS_PER_SPREAD);
    showSpread(currentSpread);
  } else {
    showSpread(currentSpread + delta);
  }
}

function jumpTo(val) {
  if (isMobile()) {
    currentMobileDay = Math.max(1, Math.min(TOTAL_DAYS, val));
    currentSpread = Math.ceil(currentMobileDay / DAYS_PER_SPREAD);
    showSpread(currentSpread);
  } else {
    showSpread(val);
  }
}

function buildSelect() {
  const sel = document.getElementById("daySelect");
  sel.innerHTML = "";
  if (isMobile()) {
    for (let d = 1; d <= TOTAL_DAYS; d++) {
      const opt = document.createElement("option");
      opt.value = String(d);
      opt.textContent = `第 ${d} 天`;
      sel.appendChild(opt);
    }
  } else {
    for (let s = 1; s <= TOTAL_SPREADS; s++) {
      const [d1, d2] = spreadDays(s);
      const opt = document.createElement("option");
      opt.value = String(s);
      opt.textContent = d1 === d2 ? `第 ${d1} 天` : `第 ${d1}-${d2} 天`;
      sel.appendChild(opt);
    }
  }
}

function initNav() {
  document.getElementById("prevBtn").addEventListener("click", () => navigate(-1));
  document.getElementById("nextBtn").addEventListener("click", () => navigate(1));
  document.getElementById("printBtn").addEventListener("click", () => window.print());

  buildSelect();
  document.getElementById("daySelect").addEventListener("change", (e) => jumpTo(Number(e.target.value)));

  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft") navigate(-1);
    if (e.key === "ArrowRight") navigate(1);
  });

  let prevMobile = isMobile();
  window.addEventListener("resize", () => {
    const nowMobile = isMobile();
    if (nowMobile !== prevMobile) {
      prevMobile = nowMobile;
      buildSelect();
      if (nowMobile) {
        const [d1] = spreadDays(currentSpread);
        currentMobileDay = d1;
      } else {
        currentSpread = Math.ceil(currentMobileDay / DAYS_PER_SPREAD);
      }
      showSpread(currentSpread);
    }
  });

  // 支持手机左右滑动翻页
  let touchStartX = 0;
  let touchStartY = 0;
  document.addEventListener("touchstart", (e) => {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
  }, { passive: true });
  document.addEventListener("touchend", (e) => {
    const dx = e.changedTouches[0].screenX - touchStartX;
    const dy = e.changedTouches[0].screenY - touchStartY;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      navigate(dx < 0 ? 1 : -1);
    }
  }, { passive: true });
}

/* ============================================================
 * 配置面板逻辑
 * ============================================================ */
function initConfigPanel() {
  const panel = document.getElementById("configPanel");
  const openBtn = document.getElementById("settingsBtn");
  const closeBtn = document.getElementById("configClose");
  const overlay = document.getElementById("configOverlay");
  const applyBtn = document.getElementById("cfgApply");
  const resetBtn = document.getElementById("cfgReset");

  // 初始化字母下拉
  const startSel = document.getElementById("cfgLetterStart");
  const endSel = document.getElementById("cfgLetterEnd");
  for (let i = 0; i < 26; i++) {
    const ch = String.fromCharCode(65 + i);
    startSel.appendChild(new Option(ch, String(i)));
    endSel.appendChild(new Option(ch, String(i)));
  }

  function openPanel() {
    syncUIFromConfig();
    panel.style.display = "flex";
  }
  function closePanel() {
    panel.style.display = "none";
  }

  openBtn.addEventListener("click", openPanel);
  closeBtn.addEventListener("click", closePanel);
  overlay.addEventListener("click", closePanel);

  applyBtn.addEventListener("click", () => {
    readConfigFromUI();
    saveConfig();
    rebuildPages();
    closePanel();
  });

  resetBtn.addEventListener("click", () => {
    CFG = { ...DEFAULT_CONFIG };
    syncUIFromConfig();
  });
}

function syncUIFromConfig() {
  document.getElementById("cfgNumMin").value = CFG.numMin;
  document.getElementById("cfgNumMax").value = CFG.numMax;
  document.getElementById("cfgMathMax").value = String(CFG.mathMax);
  document.getElementById("cfgMathAdd").checked = CFG.mathAdd;
  document.getElementById("cfgMathSub").checked = CFG.mathSub;
  document.getElementById("cfgLetterStart").value = String(CFG.letterStart);
  document.getElementById("cfgLetterEnd").value = String(CFG.letterEnd);
  document.getElementById("cfgCharsInput").value = CFG.customChars;
}

function readConfigFromUI() {
  CFG.numMin = Math.max(1, parseInt(document.getElementById("cfgNumMin").value, 10) || 1);
  CFG.numMax = Math.max(CFG.numMin, parseInt(document.getElementById("cfgNumMax").value, 10) || 100);
  CFG.mathMax = parseInt(document.getElementById("cfgMathMax").value, 10) || 10;
  CFG.mathAdd = document.getElementById("cfgMathAdd").checked;
  CFG.mathSub = document.getElementById("cfgMathSub").checked;
  if (!CFG.mathAdd && !CFG.mathSub) CFG.mathAdd = true;
  CFG.letterStart = parseInt(document.getElementById("cfgLetterStart").value, 10) || 0;
  CFG.letterEnd = parseInt(document.getElementById("cfgLetterEnd").value, 10) || 25;
  if (CFG.letterEnd < CFG.letterStart) CFG.letterEnd = CFG.letterStart;
  CFG.customChars = document.getElementById("cfgCharsInput").value;
}

function saveConfig() {
  try { localStorage.setItem("hw_config", JSON.stringify(CFG)); } catch (e) {}
}

function loadConfig() {
  try {
    const saved = localStorage.getItem("hw_config");
    if (saved) CFG = { ...DEFAULT_CONFIG, ...JSON.parse(saved) };
  } catch (e) {}
}

/* ============================================================
 * 重新生成所有页面
 * ============================================================ */
function rebuildPages() {
  const container = document.getElementById("pages");
  container.innerHTML = "";

  for (let s = 1; s <= TOTAL_SPREADS; s++) {
    const spread = document.createElement("section");
    spread.className = "spread";
    spread.dataset.spread = String(s);
    const [d1, d2] = spreadDays(s);
    spread.appendChild(renderPage(d1));
    if (d2 !== d1) spread.appendChild(renderPage(d2));
    container.appendChild(spread);
  }

  showSpread(currentSpread);
}

/* ============================================================
 * 初始化
 * ============================================================ */
function init() {
  loadConfig();
  rebuildPages();
  initNav();
  initConfigPanel();

  const mSpread = location.hash.match(/spread=(\d+)/);
  const mDay = location.hash.match(/day=(\d+)/);

  if (isMobile()) {
    if (mDay) currentMobileDay = Number(mDay[1]);
    else if (mSpread) currentMobileDay = spreadDays(Number(mSpread[1]))[0];
    currentSpread = Math.ceil(currentMobileDay / DAYS_PER_SPREAD);
  } else {
    if (mSpread) currentSpread = Number(mSpread[1]);
    else if (mDay) currentSpread = Math.ceil(Number(mDay[1]) / DAYS_PER_SPREAD);
    currentMobileDay = spreadDays(currentSpread)[0];
  }

  showSpread(currentSpread);
}

document.addEventListener("DOMContentLoaded", init);

</script>
</body>
</html>
